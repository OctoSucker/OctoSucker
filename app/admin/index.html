<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OctoSucker · 管理端</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --user: #1e3a5f;
      --agent: #1a2f26;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font-family: ui-sans-serif, system-ui, sans-serif;
      background: var(--bg); color: var(--text);
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
    .tabs {
      display: flex; gap: 4px;
    }
    .tabs button {
      padding: 8px 16px; border: 1px solid transparent; border-radius: 8px;
      background: transparent; color: var(--muted); cursor: pointer; font-size: 14px;
    }
    .tabs button:hover { color: var(--text); }
    .tabs button.active {
      background: var(--border); color: var(--text); border-color: var(--border);
    }
    /* min-height:0 so flex children (e.g. #graph) can shrink; otherwise vis canvas height stays 0 */
    main {
      display: none;
      height: calc(100vh - 53px);
      flex-direction: column;
      min-height: 0;
    }
    main.visible { display: flex; }

    /* Chat */
    #chat-log {
      flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px;
    }
    .bubble {
      max-width: min(720px, 92%); padding: 10px 14px; border-radius: 12px; line-height: 1.5;
      white-space: pre-wrap; word-break: break-word;
    }
    .bubble.user { align-self: flex-end; background: var(--user); border: 1px solid var(--border); }
    .bubble.agent { align-self: flex-start; background: var(--agent); border: 1px solid var(--border); }
    .bubble.meta { align-self: center; color: var(--muted); font-size: 13px; background: transparent; border: none; }
    .bubble.error { align-self: center; color: #f85149; font-size: 14px; border-color: #f8514944; }
    #chat-input-row {
      display: flex; gap: 10px; padding: 12px 20px; border-top: 1px solid var(--border);
      background: var(--panel);
    }
    #chat-input {
      flex: 1; min-height: 44px; max-height: 160px; resize: vertical;
      padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-size: 15px; font-family: inherit;
    }
    #chat-send {
      padding: 0 20px; border-radius: 8px; border: none;
      background: var(--accent); color: #fff; font-weight: 600; cursor: pointer; font-size: 14px;
    }
    #chat-send:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Graph */
    #graph-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 20px; border-bottom: 1px solid var(--border); background: var(--panel);
    }
    #graph-bar button {
      padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); cursor: pointer;
    }
    #graph-status { color: var(--muted); font-size: 14px; }
    #graph {
      flex: 1 1 0;
      min-height: 0;
      width: 100%;
      position: relative;
      overflow: hidden;
      background: #111820;
    }
  </style>
</head>
<body>
  <header>
    <h1>OctoSucker · 管理端</h1>
    <nav class="tabs" role="tablist">
      <button type="button" role="tab" id="tab-chat" class="active" aria-selected="true">对话</button>
      <button type="button" role="tab" id="tab-graph" aria-selected="false">知识图谱</button>
    </nav>
  </header>

  <main id="panel-chat" class="visible" role="tabpanel">
    <div id="chat-log" aria-live="polite"></div>
    <div id="chat-input-row">
      <textarea id="chat-input" rows="2" placeholder="输入消息，Enter 发送（Shift+Enter 换行）" autocomplete="off"></textarea>
      <button type="button" id="chat-send">发送</button>
    </div>
  </main>

  <main id="panel-graph" role="tabpanel">
    <div id="graph-bar">
      <button type="button" id="graph-reload">重新加载</button>
      <span id="graph-status"></span>
    </div>
    <div id="graph"></div>
  </main>

  <script>
    const chatLog = document.getElementById('chat-log');
    const chatInput = document.getElementById('chat-input');
    const chatSend = document.getElementById('chat-send');
    const tabChat = document.getElementById('tab-chat');
    const tabGraph = document.getElementById('tab-graph');
    const panelChat = document.getElementById('panel-chat');
    const panelGraph = document.getElementById('panel-graph');

    function appendBubble(className, text) {
      const el = document.createElement('div');
      el.className = 'bubble ' + className;
      el.textContent = text;
      chatLog.appendChild(el);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    tabChat.addEventListener('click', function () {
      tabChat.classList.add('active');
      tabGraph.classList.remove('active');
      tabChat.setAttribute('aria-selected', 'true');
      tabGraph.setAttribute('aria-selected', 'false');
      panelChat.classList.add('visible');
      panelGraph.classList.remove('visible');
    });
    tabGraph.addEventListener('click', function () {
      tabGraph.classList.add('active');
      tabChat.classList.remove('active');
      tabGraph.setAttribute('aria-selected', 'true');
      tabChat.setAttribute('aria-selected', 'false');
      panelGraph.classList.add('visible');
      panelChat.classList.remove('visible');
      if (typeof window.__graphNeedsInit !== 'undefined' && window.__graphNeedsInit) {
        window.__graphNeedsInit = false;
        /* Layout must be painted before vis reads container size */
        requestAnimationFrame(function () {
          requestAnimationFrame(function () { loadGraph(); });
        });
      }
    });

    async function sendChat() {
      const text = chatInput.value.trim();
      if (!text) return;
      chatInput.value = '';
      appendBubble('user', text);
      chatSend.disabled = true;
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const raw = await res.text();
        let data;
        try { data = JSON.parse(raw); } catch (e) {
          appendBubble('error', '响应解析失败: ' + raw.slice(0, 200));
          return;
        }
        if (!res.ok) {
          appendBubble('error', data.error || raw || ('HTTP ' + res.status));
          return;
        }
        if (data.error) {
          appendBubble('error', data.error);
          return;
        }
        const msgs = data.messages || [];
        if (msgs.length === 0) {
          appendBubble('meta', '（无回复）');
        } else {
          msgs.forEach(function (m) { appendBubble('agent', m); });
        }
      } catch (e) {
        appendBubble('error', String(e.message || e));
      } finally {
        chatSend.disabled = false;
        chatInput.focus();
      }
    }

    chatSend.addEventListener('click', sendChat);
    chatInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendChat();
      }
    });

    appendBubble('meta', '与本地 cmd REPL 共用同一 agent；并发请求会收到「正忙」提示。');

    /* Graph (same API as cmd/kgviz) */
    const graphContainer = document.getElementById('graph');
    const graphStatus = document.getElementById('graph-status');
    let network = null;
    window.__graphNeedsInit = true;

    function setGraphStatus(msg) { graphStatus.textContent = msg; }

    async function loadGraph() {
      setGraphStatus('加载中…');
      const res = await fetch('/api/graph', { cache: 'no-store' });
      if (!res.ok) {
        setGraphStatus('错误 ' + res.status + ': ' + await res.text());
        return;
      }
      const data = await res.json();
      const nodeRows = data.nodes || [];
      const edgeRows = data.edges || [];
      const nodes = new vis.DataSet(nodeRows.map(function (n) {
        return { id: n.id, label: n.label || n.id, title: n.id };
      }));
      const edges = new vis.DataSet(edgeRows.map(function (e, i) {
        return {
          id: String(i) + ':' + e.from + '->' + e.to,
          from: e.from,
          to: e.to,
          arrows: 'to',
          color: e.positive ? '#3fb950' : '#f85149',
          font: { color: '#c9d1d9', size: 12 },
          label: e.positive ? '+' : '−'
        };
      }));
      if (network) {
        network.destroy();
        network = null;
      }
      const options = {
        nodes: {
          shape: 'dot',
          size: 18,
          font: { size: 13, color: '#e7ecf3' },
          borderWidth: 1,
          color: { border: '#8b9cb3', background: '#388bfd88' }
        },
        edges: { smooth: { type: 'dynamic' } },
        physics: {
          enabled: true,
          stabilization: { iterations: 250 }
        },
        interaction: { hover: true, tooltipDelay: 80 }
      };
      network = new vis.Network(graphContainer, { nodes: nodes, edges: edges }, options);
      function fitGraph() {
        try {
          network.fit({ animation: false });
        } catch (e) { /* ignore */ }
      }
      network.once('stabilizationIterationsDone', fitGraph);
      setTimeout(fitGraph, 400);
      setGraphStatus(nodeRows.length + ' 个节点，' + edgeRows.length + ' 条边');
    }

    document.getElementById('graph-reload').addEventListener('click', function () {
      requestAnimationFrame(function () { loadGraph(); });
    });
  </script>
</body>
</html>

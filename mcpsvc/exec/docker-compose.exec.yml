# Set EXEC_HOST_REPO_DIR, MCP_EXEC_REPO_MOUNT, EXEC_WORKSPACE_DIRS in the shell before `docker compose`.
services:
  mcp-exec:
    build:
      context: ${EXEC_HOST_REPO_DIR:?}
      dockerfile: mcpsvc/exec/Dockerfile.mcp-exec
    image: octosucker-mcp-exec:latest
    command: ["-listen", ":${MCP_EXEC_PORT:-8766}"]
    ports:
      - "${MCP_EXEC_PORT:-8766}:${MCP_EXEC_PORT:-8766}"
    environment:
      EXEC_HOST_REPO_DIR: ${EXEC_HOST_REPO_DIR}
      MCP_EXEC_REPO_MOUNT: ${MCP_EXEC_REPO_MOUNT:?}
      EXEC_WORKSPACE_DIRS: ${EXEC_WORKSPACE_DIRS:?}
      # Docker Desktop (Mac): export EXEC_NESTED_DOCKER_USE_HOST_MNT_PREFIX=1 before compose so nested docker -v uses /host_mnt/Users/...
      EXEC_NESTED_DOCKER_USE_HOST_MNT_PREFIX: ${EXEC_NESTED_DOCKER_USE_HOST_MNT_PREFIX:-}
      EXEC_MCP_LOG_CONFIG: ${EXEC_MCP_LOG_CONFIG:-}
      EXEC_CONTAINER_RUNTIME: docker
      EXEC_CONTAINER_IMAGE: octosucker-exec-sandbox:latest
      EXEC_CONTAINER_NAME: octosucker-agent-sandbox
      EXEC_CONTAINER_WORKSPACE_DIR: /workspace
      EXEC_CONTAINER_READONLY_ROOT: "1"
      EXEC_CONTAINER_USER: "65532:65532"
      EXEC_COMMAND_TIMEOUT_SEC: "60"
    volumes:
      - ${EXEC_HOST_REPO_DIR:?}:${MCP_EXEC_REPO_MOUNT:?}
      - /var/run/docker.sock:/var/run/docker.sock
